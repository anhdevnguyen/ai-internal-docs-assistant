user  nginx;
# One worker per CPU core is standard. "auto" lets nginx detect core count.
worker_processes auto;

error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';

    access_log /var/log/nginx/access.log main;

    sendfile        on;
    keepalive_timeout 65;

    # Hide nginx version from response headers — minor but free security hardening.
    server_tokens off;

    # Prevent clickjacking across all vhosts.
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;

    # Increase upload buffer for document uploads (must match Spring's multipart limit).
    client_max_body_size 55M;

    include /etc/nginx/conf.d/*.conf;
}