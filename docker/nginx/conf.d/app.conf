# ─── HTTP: redirect all traffic to HTTPS ─────────────────────────────────────
# Exception: ACME challenge must stay on HTTP for Certbot to verify domain ownership.
server {
    listen 80;
    server_name YOUR_DOMAIN.COM www.YOUR_DOMAIN.COM;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ─── HTTPS: main vhost ───────────────────────────────────────────────────────
server {
    listen 443 ssl;
    http2 on;
    server_name YOUR_DOMAIN.COM www.YOUR_DOMAIN.COM;

    ssl_certificate     /etc/letsencrypt/live/YOUR_DOMAIN.COM/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN.COM/privkey.pem;

    # Modern TLS configuration — drops TLS 1.0/1.1 which are deprecated.
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;

    # HSTS: tells browsers to always use HTTPS for this domain for 1 year.
    # Do NOT set this until you're certain the domain will always have valid SSL.
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ── API: proxy to Spring Boot backend ─────────────────────────────────────
    location /api/ {
        proxy_pass         http://backend:8080;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Forward timeouts for long-running LLM calls (can take 5-10s).
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;

        # Required for streaming responses (if added later).
        proxy_buffering off;
    }

    # ── Actuator health endpoint: expose only /health ─────────────────────────
    # Other actuator endpoints are blocked in Spring's SecurityConfig,
    # but we add a belt-and-suspenders block here at the proxy level.
    location /actuator/health {
        proxy_pass http://backend:8080/actuator/health;
        proxy_set_header Host $host;
        # Allow monitoring tools to reach this without auth.
    }

    location /actuator {
        # Block all other actuator endpoints at the proxy level.
        return 403;
    }

    # ── Frontend: proxy to nginx-spa container ────────────────────────────────
    location / {
        proxy_pass       http://frontend:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}