spring:
  profile:
    active: dev
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/ai_docs_db}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

  flyway:
    enabled: true

  # Reject oversized uploads at the servlet layer before hitting application code
  servlet:
    multipart:
      max-file-size: ${STORAGE_MAX_FILE_MB:50}MB
      max-request-size: ${STORAGE_MAX_FILE_MB:50}MB

  # Allow @Async methods to run on a managed thread pool
  task:
    execution:
      pool:
        core-size: 4
        max-size: 16
        queue-capacity: 100
      thread-name-prefix: ingestion-

server:
  port: ${SERVER_PORT:8080}

app:
  jwt:
    access-token-secret: ${JWT_ACCESS_SECRET:u4H5lW5l3pze23eYpu88jTKXgjz5cf395WXXOfQiSAZ}
    access-token-ttl: ${JWT_ACCESS_TTL:15m}
    refresh-token-ttl: ${JWT_REFRESH_TTL:7d}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}
  storage:
    base-path: ${STORAGE_BASE_PATH:/tmp/docmind-storage}
    max-file-size-mb: ${STORAGE_MAX_FILE_MB:50}
    allowed-mime-types:
      - application/pdf
      - application/vnd.openxmlformats-officedocument.wordprocessingml.document
      - text/plain
  # chunking and ai were previously nested under app.storage — incorrect binding
  chunking:
    chunk-size-tokens: ${CHUNKING_CHUNK_SIZE:512}
    overlap-tokens: ${CHUNKING_OVERLAP:50}
  ai:
    openai-api-key: ${OPENAI_API_KEY:}
    embedding-model: text-embedding-3-small
    embedding-batch-size: 20
    base-url: https://api.openai.com/v1