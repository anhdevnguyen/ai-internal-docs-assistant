spring:
  profile:
    active: dev
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/ai_docs_db}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

  flyway:
    enabled: true

  servlet:
    multipart:
      max-file-size: ${STORAGE_MAX_FILE_MB:50}MB
      max-request-size: ${STORAGE_MAX_FILE_MB:50}MB

  task:
    execution:
      pool:
        core-size: 4
        max-size: 16
        queue-capacity: 100
      thread-name-prefix: ingestion-

server:
  port: ${SERVER_PORT:8080}

# Expose only the health endpoint — all others are blocked in SecurityConfig.
# Sensitive endpoints (env, beans, loggers) must never be reachable in production.
management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never

logging:
  pattern:
    # MDC fields are injected by MdcRequestFilter on every request.
    # Fields will be blank ("") for system threads not associated with a request.
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level [reqId=%X{requestId}][tenant=%X{tenantId}][user=%X{userId}] %logger{36} - %msg%n"

app:
  jwt:
    access-token-secret: ${JWT_ACCESS_SECRET:aSMSBe5Sl7AVuUMIPDNJpsPnYslzXmTn5JEHpPbGSKB}
    access-token-ttl: ${JWT_ACCESS_TTL:15m}
    refresh-token-ttl: ${JWT_REFRESH_TTL:7d}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}
  storage:
    base-path: ${STORAGE_BASE_PATH:/tmp/docmind-storage}
    max-file-size-mb: ${STORAGE_MAX_FILE_MB:50}
    allowed-mime-types:
      - application/pdf
      - application/vnd.openxmlformats-officedocument.wordprocessingml.document
      - text/plain
  chunking:
    chunk-size-tokens: ${CHUNKING_CHUNK_SIZE:512}
    overlap-tokens: ${CHUNKING_OVERLAP:50}
  ai:
    openai-api-key: ${OPENAI_API_KEY}
    base-url: https://api.openai.com/v1
    embedding-model: text-embedding-3-small
    embedding-batch-size: 20
    chat-model: ${CHAT_MODEL:gpt-4o-mini}
    chat-max-tokens: ${CHAT_MAX_TOKENS:1500}
    # temperature=0 — RAG requires factual accuracy, not creativity
    chat-temperature: 0.0
    retrieval-top-k: ${RETRIEVAL_TOP_K:5}
    # Chunks below this cosine similarity threshold introduce noise, not signal
    retrieval-min-similarity: ${RETRIEVAL_MIN_SIMILARITY:0.70}