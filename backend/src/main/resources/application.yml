spring:
  profile:
    active: dev
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/ai_docs_db}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

  flyway:
    enabled: true

  servlet:
    multipart:
      max-file-size: ${STORAGE_MAX_FILE_MB:50}MB
      max-request-size: ${STORAGE_MAX_FILE_MB:50}MB

  task:
    execution:
      pool:
        core-size: 4
        max-size: 16
        queue-capacity: 100
      thread-name-prefix: ingestion-

server:
  port: ${SERVER_PORT:8080}

app:
  jwt:
    access-token-secret: ${JWT_ACCESS_SECRET:u4H5lW5l3pze23eYpu88jTKXgjz5cf395WXXOfQiSAZ}
    access-token-ttl: ${JWT_ACCESS_TTL:15m}
    refresh-token-ttl: ${JWT_REFRESH_TTL:7d}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}
  storage:
    base-path: ${STORAGE_BASE_PATH:/tmp/docmind-storage}
    max-file-size-mb: ${STORAGE_MAX_FILE_MB:50}
    allowed-mime-types:
      - application/pdf
      - application/vnd.openxmlformats-officedocument.wordprocessingml.document
      - text/plain
  chunking:
    chunk-size-tokens: ${CHUNKING_CHUNK_SIZE:512}
    overlap-tokens: ${CHUNKING_OVERLAP:50}
  ai:
    openai-api-key: ${OPENAI_API_KEY:}
    base-url: https://api.openai.com/v1

    # Embedding
    embedding-model: text-embedding-3-small
    embedding-batch-size: 20

    # Chat completion
    # temperature=0 — RAG requires factual accuracy, not creativity
    chat-model: ${CHAT_MODEL:gpt-4o-mini}
    chat-max-tokens: ${CHAT_MAX_TOKENS:1500}
    chat-temperature: 0.0

    # Retrieval tuning
    # top-k=5 is a conservative default; increase if context window budget allows
    retrieval-top-k: ${RETRIEVAL_TOP_K:5}
    # Chunks with cosine similarity below this threshold introduce noise, not signal
    retrieval-min-similarity: ${RETRIEVAL_MIN_SIMILARITY:0.70}