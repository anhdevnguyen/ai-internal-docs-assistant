server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Serve static assets with aggressive caching.
    # Vite hashes asset filenames on build, so immutable cache is safe.
    location ~* \.(js|css|png|svg|ico|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # All other routes fall through to index.html — React Router takes over.
    location / {
        try_files $uri $uri/ /index.html;
    }
}