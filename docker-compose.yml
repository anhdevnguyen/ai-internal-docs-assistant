services:

  # ─── PostgreSQL + pgvector ───────────────────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    container_name: ai_docs_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-ai_docs_db}
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # Do NOT expose port 5432 to the host in production.
    # Only services in the same Docker network need to reach it.
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Backend API ─────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ai_docs_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/${DB_NAME:-ai_docs_db}
      DB_USERNAME: ${DB_USERNAME:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:?JWT_ACCESS_SECRET is required}
      JWT_ACCESS_TTL: ${JWT_ACCESS_TTL:-15m}
      JWT_REFRESH_TTL: ${JWT_REFRESH_TTL:-7d}
      OPENAI_API_KEY: ${OPENAI_API_KEY:?OPENAI_API_KEY is required}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost}
      STORAGE_BASE_PATH: /app/storage
      STORAGE_MAX_FILE_MB: ${STORAGE_MAX_FILE_MB:-50}
      CHAT_MODEL: ${CHAT_MODEL:-gpt-4o-mini}
    volumes:
      # Persist uploaded files across container restarts.
      # Without this, every redeploy wipes all uploaded documents.
      - document_storage:/app/storage
    expose:
      - "8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ─── Frontend ────────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ai_docs_frontend
    restart: unless-stopped
    expose:
      - "80"

  # ─── Nginx Reverse Proxy ─────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: ai_docs_nginx
    restart: unless-stopped
    depends_on:
      - backend
      - frontend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/conf.d:/etc/nginx/conf.d:ro
      # Certbot writes certs here; nginx reads them.
      - certbot_certs:/etc/letsencrypt:ro
      # Certbot ACME challenge webroot.
      - certbot_webroot:/var/www/certbot:ro

  # ─── Certbot (runs once then exits — renewed via cron or CI schedule) ─────────
  certbot:
    image: certbot/certbot:latest
    container_name: ai_docs_certbot
    volumes:
      - certbot_certs:/etc/letsencrypt
      - certbot_webroot:/var/www/certbot
    # Default command does nothing — run manually or via cron:
    # docker compose run --rm certbot certonly --webroot ...
    entrypoint: /bin/sh -c "trap exit TERM; while :; do sleep 12h; certbot renew --quiet; done"

volumes:
  postgres_data:
  document_storage:
  certbot_certs:
  certbot_webroot: